<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Water Tank</title>
  </head>
  <body>
    <input id="inputArray" />
    <button onclick="calculate()">Calculate</button>

    <div id="result"></div>
    <script>
      function trapWater(height) {
        let left = 0;
        let right = height.length - 1;

        let leftMax = 0;
        let rightMax = 0;

        let water = 0;

        while (left < right) {
          if (height[left] < height[right]) {
            if (height[left] >= leftMax) leftMax = height[left];
            else water += leftMax - height[left];

            left++;
          } else {
            if (height[right] >= rightMax) rightMax = height[right];
            else water += rightMax - height[right];

            right--;
          }
        }

        return water;
      }

      console.log(trapWater([0, 4, 0, 0, 0, 6, 0, 6, 4, 0]));
      function calculate() {
        let arr = document
          .getElementById("inputArray")
          .value.split(",")
          .map(Number);

        let result = trapWater(arr);

        document.getElementById("result").innerHTML =
          "Water Stored = " + result;
      }
    </script>
  </body>
</html>
